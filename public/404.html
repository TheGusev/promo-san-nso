<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — Страница не найдена | СанРешения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 480px; }
    .code { font-size: 96px; font-weight: 800; color: #16a34a; line-height: 1; }
    h1 { font-size: 24px; margin: 16px 0 8px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.5; }
    a {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Запрашиваемая страница не существует или была перемещена. Вернитесь на главную страницу сайта.</p>
    <a href="/">На главную</a>
  </div>
</body>
</html>
